name: Feature request
description: Suggest a new feature or a change to an existing one.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Start with the problem, not the solution. A clear user story makes it easier to agree on scope before any code is written.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What makes it hard today?
      placeholder: |
        As an agent maintaining a knowledge graph, I want ... so that ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Your suggested solution, if you have one. Pseudo-code or a sketch is fine.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you looked at and why they did not work.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, related projects, prior art.
