name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. A clear reproduction is the single most useful thing you can include.
        For security issues, please do NOT open a public issue — see [SECURITY.md](../SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, numbered steps. Include exact commands and any test data.
      placeholder: |
        1. Run `npm run dev`
        2. POST to `/mcp` with payload `...`
        3. Observe `500` response
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include error messages, stack traces, and HTTP status codes where relevant.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: plexus version / commit
      description: Output of `git rev-parse --short HEAD` or the release tag you installed.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, Docker version, SurrealDB version.
      placeholder: macOS 14.5, Node 22.11, Docker 27.3, SurrealDB 2.1
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Logs, screenshots, related issues, hypotheses.
