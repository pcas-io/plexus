# plexus (_graph) — on-prem knowledge graph
#
# Default stack: worker + SurrealDB on a shared bridge network, worker
# published on 127.0.0.1:8787 for local use. Put a TLS-terminating reverse
# proxy (Caddy, Traefik, nginx) in front for anything beyond localhost.
#
# Coolify users: layer docker-compose.coolify.yml on top, which adds the
# external coolify network and the Traefik label so Coolify's built-in
# proxy can route to the container.
#
#   docker compose -f docker-compose.yml -f docker-compose.coolify.yml up -d

services:
  surrealdb:
    image: surrealdb/surrealdb:v2.1
    restart: unless-stopped
    # Run as root so rocksdb can own the mounted volume regardless of how
    # the host initialises the named-volume directory. The official
    # surrealdb image has no hard user, so this is an explicit choice.
    user: "0:0"
    command:
      - start
      - --log
      - info
      - --username
      - ${PLEXUS_SURREAL_USER:?required}
      - --password
      - ${PLEXUS_SURREAL_PASS:?required}
      - --bind
      - 0.0.0.0:8000
      - rocksdb:/data/plexus.db
    volumes:
      - surrealdb_data:/data
    networks:
      plexus_net:
        aliases:
          - surrealdb

  plexus:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      surrealdb:
        condition: service_started
    environment:
      PLEXUS_PORT: ${PLEXUS_PORT:-8787}
      PLEXUS_BASE_URL: ${PLEXUS_BASE_URL:-http://localhost:8787}
      PLEXUS_LOG_LEVEL: ${PLEXUS_LOG_LEVEL:-info}
      PLEXUS_ADMIN_TOKEN: ${PLEXUS_ADMIN_TOKEN:?required}
      PLEXUS_OAUTH_SECRET: ${PLEXUS_OAUTH_SECRET:?required}
      PLEXUS_COOKIE_SECRET: ${PLEXUS_COOKIE_SECRET:?required}
      PLEXUS_SURREAL_URL: http://surrealdb:8000
      PLEXUS_SURREAL_USER: ${PLEXUS_SURREAL_USER:?required}
      PLEXUS_SURREAL_PASS: ${PLEXUS_SURREAL_PASS:?required}
      PLEXUS_SURREAL_NS: ${PLEXUS_SURREAL_NS:-plexus}
      PLEXUS_SURREAL_DB: ${PLEXUS_SURREAL_DB:-main}
      PLEXUS_RP_ID: ${PLEXUS_RP_ID:-localhost}
      PLEXUS_RP_NAME: ${PLEXUS_RP_NAME:-Plexus}
    # Bind to localhost only by default so a typo in a public DNS record
    # cannot accidentally expose the dashboard. For LAN or remote access,
    # run behind a reverse proxy instead of rebinding to 0.0.0.0.
    ports:
      - "127.0.0.1:${PLEXUS_PORT:-8787}:8787"
    networks:
      - plexus_net

networks:
  plexus_net:
    driver: bridge

volumes:
  surrealdb_data:
